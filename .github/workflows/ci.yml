name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate required structure
        run: |
          test -d components/esp32_matter_thread
          test -d examples/led
          test -f examples/led/main/main.cpp
          test -f examples/led/main/Kconfig.projbuild
          test -f development.log
          test -f docs/commissioning.md
          test -f docs/testing.md
          test -f docs/esp32-lifecycle-manager.md
          test -f scripts/lifecycle_package.sh
          test -f scripts/new_example.sh
          test -f scripts/verify_lifecycle_signature.sh
          test -f docs/troubleshooting.md
          test -f NOOB.md
          test -f scripts/noob_led.sh

  scripts-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bash syntax
        run: bash -n scripts/*.sh
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh

  format-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check C/C++ formatting
        run: ./scripts/check_format.sh

  docker-build-led:
    runs-on: ubuntu-latest
    needs: [structure, scripts-quality, format-quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - idf_image: "espressif/idf:v5.4.2"
            experimental: false
          - idf_image: "espressif/idf:v6.0"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v6
      - name: Run doctor
        run: ./scripts/doctor.sh
      - name: Clean build artifacts
        run: |
          # Remove build output and cached managed_components so they are
          # re-downloaded fresh.  Do NOT delete dependencies.lock: the
          # committed lock pins esp_matter to the exact 1.4.0 base archive
          # (component_hash a1c97fe1…) which was verified to compile with
          # IDF v5.4.2/GCC-14.  Without the lock the component manager
          # selects the latest 1.4.0~N patch, which introduced
          # ClosureControl::GenericOverallTargetState – a struct without
          # operator== that breaks std::optional comparison under GCC 14.
          rm -rf examples/led/build examples/led/managed_components
      - name: IDF support status
        run: |
          if [[ "${{ matrix.experimental }}" == "true" ]]; then
            echo "=== IDF v6.0: EXPERIMENTAL (expected to fail) ==="
            echo "Known incompatibilities with esp_matter 1.4.0 on IDF v6.0:"
            echo "  1. esp_encrypted_img 2.1.0 (pinned by esp_matter 1.4.0) includes"
            echo "     mbedtls/entropy.h directly. IDF v6.0 restructured mbedTLS:"
            echo "     that header is no longer on the default include path"
            echo "     (it lives only under OpenThread's bundled copy)."
            echo "     Resolution: requires esp_matter >= 1.4.x that allows"
            echo "     esp_encrypted_img >= 2.2 (IDF-v6-compatible)."
            echo "  2. The built-in 'json' component may be absent in IDF v6.0;"
            echo "     esp_matter CMakeLists.txt lists it in REQUIRE_COMPONENTS."
            echo "This job is continue-on-error: true and does not block CI."
          else
            echo "ESP-IDF v5.4.2 is the primary supported CI target."
            echo "Using committed dependencies.lock (esp_matter 1.4.0 base, no ~N patch)."
          fi
      - name: Build LED example in Docker (ESP32-C6)
        env:
          IDF_DOCKER_IMAGE: ${{ matrix.idf_image }}
        run: ./scripts/build.sh examples/led esp32c6
